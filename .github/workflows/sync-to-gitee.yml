name: Sync to Gitee
on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror the GitHub repo to Gitee
        # 换成了加强版插件，支持显式的 https 模式
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/uaenawook
          dst: gitee/uaenawook
          dst_token: ${{ secrets.GITEE_TOKEN }}
          # 强制指定 HTTPS，彻底甩掉 SSH 密钥的烦恼
          clone_style: "https"
          static_list: "study2026"
          force_update: true
          debug: true