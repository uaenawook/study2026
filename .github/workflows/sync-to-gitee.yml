name: Sync to Gitee
on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取 GitHub 代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取所有分支和历史记录

      # 第二步：使用 HTTPS Token 直接强制推送
      - name: Push to Gitee (Manual Mode)
        run: |
          # 这一行是核心：直接把 Token 拼在 HTTPS 链接里，绕过所有 SSH 检查
          git remote add gitee https://uaenawook:${{ secrets.GITEE_TOKEN }}@gitee.com/uaenawook/study2026.git
          git push -f gitee main