name: Sync to Gitee
on:
  push:
    branches:
      - main  # 只有推送到 GitHub 的 main 分支才会触发同步

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      # 第一步：把 GitHub 上的代码拉取到虚拟机里
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整历史，确保同步记录完整

      # 第二步：手动强制推送到 Gitee
      - name: Push to Gitee (Final Manual Mode)
        env:
          # 引用您在 GitHub Secrets 中存好的令牌
          G_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 1. 核心防御：禁止终端交互，报错立刻停止，绝不卡死
          export GIT_TERMINAL_PROMPT=0
          
          # 2. 身份配置（让 Gitee 知道是谁在提交）
          git config --global user.email "820649664@qq.com"
          git config --global user.name "uaenawook"
          
          # 3. 执行强制推送（注意：这里我把变量都写好了，看下方的修改指南）
          # 语法：git push -f https://[用户名]:[令牌]@[地址]/[用户名]/[仓库名].git [本地分支]:[远程分支]
          git push -f https://uaenawook:${G_TOKEN}@gitee.com/uaenawook/study2026.git main:main