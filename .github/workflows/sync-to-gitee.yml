name: Sync to Gitee
on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror the GitHub repo to Gitee
        uses: Yikun/gitee-mirror-action@master
        with:
          # 来源和目的地保持不变
          src: github/uaenawook
          dst: gitee/uaenawook
          # 核心修改：使用 Token 认证，移除 dst_key
          dst_token: ${{ secrets.GITEE_TOKEN }}
          # 显式指定使用 https 协议，避开 SSH 指纹检查
          clone_style: "https"
          static_list: "study2026"
          force_update: true
          debug: true