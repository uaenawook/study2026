name: Sync to Gitee
on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      # 第一步：将 Gitee 加入已知主机列表，防止 SSH 挂起
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      # 第二步：执行原有的同步任务
      - name: Mirror the GitHub repo to Gitee
        uses: Yikun/gitee-mirror-action@master
        with:
          src: github/uaenawook
          dst: gitee/uaenawook
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "study2026"
          force_update: true
          debug: true